name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25.12'
          cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test -count=1 ./...
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: $(go env GOPATH)/bin/staticcheck ./...
      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-input: '1.25.12'
          go-package: ./...
          repo-checkout: false
      - run: bash -n install.sh scripts/*.sh
      - run: bash scripts/check-sensitive-files.sh
      - run: docker compose -f docker-compose.yml config >/dev/null
      - run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'
      - run: npm ci
        working-directory: web
      - run: python3 scripts/generate-third-party-notices.py
      - run: git diff --exit-code -- THIRD_PARTY_NOTICES.txt
      - run: npm audit --audit-level=high
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm run build
        working-directory: web
