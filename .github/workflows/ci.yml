name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25.12'
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test -count=1 ./...
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: $(go env GOPATH)/bin/staticcheck ./...
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: '1.25.12'
          go-package: ./...
          repo-checkout: false
      - run: bash -n install.sh scripts/*.sh
      - run: docker compose -f docker-compose.yml config >/dev/null
      - run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'
      - run: npm ci
        working-directory: web
      - run: npm audit --omit=dev --audit-level=high
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm run build
        working-directory: web
