name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Validate release tag policy
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          bash scripts/check-release-policy.sh "$GITHUB_REF_NAME" "$GITHUB_SHA" origin/main
          release_status=$(curl -sS -o /tmp/existing-release.json -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")
          case "$release_status" in
            404) ;;
            200) echo "release already exists for $GITHUB_REF_NAME" >&2; exit 1 ;;
            *) echo "cannot verify release uniqueness (GitHub API HTTP $release_status)" >&2; exit 1 ;;
          esac

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25.12'
          cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test -count=1 ./...
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: $(go env GOPATH)/bin/staticcheck ./...
      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-input: '1.25.12'
          go-package: ./...
          repo-checkout: false
      - run: bash -n install.sh scripts/*.sh
      - run: bash scripts/check-sensitive-files.sh
      - run: docker compose -f docker-compose.yml config >/dev/null
      - run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'
      - run: npm ci
        working-directory: web
      - run: python3 scripts/generate-third-party-notices.py
      - run: git diff --exit-code -- THIRD_PARTY_NOTICES.txt
      - run: npm audit --audit-level=high
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm run build
        working-directory: web

  image:
    runs-on: ubuntu-latest
    needs: [release-policy, test]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/zeno
          tags: |
            type=ref,event=branch
            type=ref,event=tag
      - name: Resolve image version label
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            REVISION=${{ github.sha }}
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/zeno
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  promote-latest:
    name: Promote highest stable SemVer to latest
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [image]
    concurrency:
      group: zeno-latest-promotion
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Decide whether this tag is the highest stable release
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          python3 scripts/latest-promotion.py "$GITHUB_REF_NAME" < <(git tag --list 'v*') >> "$GITHUB_OUTPUT"
      - name: Atomically promote the immutable version manifest
        if: steps.policy.outputs.promote == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/zeno"
          docker buildx imagetools create --tag "${image}:latest" "${image}:${GITHUB_REF_NAME}"
          docker buildx imagetools inspect "${image}:latest"
