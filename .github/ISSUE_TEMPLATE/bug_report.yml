name: Bug report
about: Report a reproducible Zeno Controller or UI bug
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述 / Summary
      description: 简短说明发生了什么。
    validations:
      required: true
  - type: input
    id: controller-version
    attributes:
      label: Controller version
      placeholder: latest or image digest
    validations:
      required: true
  - type: input
    id: agent-version
    attributes:
      label: Agent version
      placeholder: latest / not related
  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式 / Deployment
      options:
        - Docker Compose
        - Source build
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Browser
      placeholder: Debian 13, Ubuntu 24.04, Windows 11, Chrome 126...
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果 / Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / Actual behavior
  - type: textarea
    id: logs
    attributes:
      label: 日志 / Logs
      description: 请隐藏 token、密码、Bot Token、域名敏感路径等。
      render: shell
      placeholder: |
        docker compose logs --tail=200 zeno
        journalctl -u zeno-agent.service --since '10 minutes ago' --no-pager
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: 我已隐藏 token、密码、Telegram Bot Token 等敏感信息。
          required: true
        - label: 我已确认不是浏览器缓存或旧镜像导致的问题。
          required: false
